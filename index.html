<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>สรุปการเงินรายเดือน</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #4CAF50;
            --danger: #f44336;
            --info: #2196F3;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: var(--primary);
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .summary {
            display: flex;
            justify-content: space-between;
            text-align: center;
            margin-top: 15px;
        }
        .summary div {
            flex: 1;
        }
        .summary h3 {
            margin: 5px 0;
            font-size: 1.2rem;
        }
        .text-green { color: var(--primary); }
        .text-red { color: var(--danger); }
        
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
        .btn-excel {
            background-color: var(--info);
            margin-top: 15px;
        }
        .btn-excel:hover { background-color: #1976D2; }
        
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--danger);
        }
        .expense-info {
            display: flex;
            flex-direction: column;
        }
        .expense-date {
            font-size: 0.75rem;
            color: #888;
        }
        .delete-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            width: auto;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบจัดการเงินรายเดือน</h1>

    <div class="card">
        <label for="budget">เงินที่ตั้งไว้เดือนนี้ (บาท)</label>
        <input type="number" id="budget" placeholder="เช่น 15000">
        <button onclick="setBudget()">บันทึกงบประมาณ</button>
        
        <div class="summary">
            <div>
                <p>งบประมาณ</p>
                <h3 id="display-budget" class="text-green">0</h3>
            </div>
            <div>
                <p>ใช้ไปแล้ว</p>
                <h3 id="display-expense" class="text-red">0</h3>
            </div>
            <div>
                <p>คงเหลือ</p>
                <h3 id="display-balance">0</h3>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>เพิ่มรายการใช้จ่าย</h3>
        <label for="expense-category">เลือกหมวดหมู่</label>
        <select id="expense-category">
            <option value="ค่าของกิน">1. ค่าของกิน</option>
            <option value="ค่ารถ">2. ค่ารถ</option>
            <option value="ค่าของใช้ต่างๆ">3. ค่าของใช้ต่างๆ (สบู่/น้ำยาล้างจาน/อื่นๆ)</option>
            <option value="ค่ารายเดือน">4. ค่ารายเดือน (ค่าเน็ต/ค่าน้ำ/ค่ายูทูป)</option>
            <option value="ค่าเติมเกม">5. ค่าเติมเกม</option>
            <option value="อื่นๆ">6. อื่นๆ</option>
        </select>
        
        <label for="expense-amount">จำนวนเงิน (บาท)</label>
        <input type="number" id="expense-amount" placeholder="เช่น 150">
        
        <button onclick="addExpense()">เพิ่มรายการ</button>
    </div>

    <div class="card">
        <h3>วิเคราะห์การใช้จ่ายรายวัน</h3>
        <canvas id="expenseChart"></canvas>
    </div>

    <div class="card">
        <h3>ประวัติการใช้จ่าย</h3>
        <ul id="expense-list"></ul>
        <button class="btn-excel" onclick="exportToExcel()">📊 ดาวน์โหลดเป็น Excel</button>
    </div>
</div>

<script>
    let budget = localStorage.getItem('budget') ? parseFloat(localStorage.getItem('budget')) : 0;
    let expenses = localStorage.getItem('expenses') ? JSON.parse(localStorage.getItem('expenses')) : [];
    let myChart = null;

    function updateUI() {
        document.getElementById('display-budget').innerText = budget.toLocaleString();
        
        let totalExpense = expenses.reduce((sum, item) => sum + item.amount, 0);
        document.getElementById('display-expense').innerText = totalExpense.toLocaleString();
        
        let balance = budget - totalExpense;
        let balanceEl = document.getElementById('display-balance');
        balanceEl.innerText = balance.toLocaleString();
        
        balanceEl.style.color = balance < 0 ? "var(--danger)" : "var(--text)";

        let listEl = document.getElementById('expense-list');
        listEl.innerHTML = '';
        expenses.forEach((expense, index) => {
            let li = document.createElement('li');
            let dateStr = expense.date ? expense.date : 'ไม่ระบุวันที่';
            li.innerHTML = `
                <div class="expense-info">
                    <span>${expense.name} <strong>฿${expense.amount.toLocaleString()}</strong></span>
                    <span class="expense-date">${dateStr}</span>
                </div>
                <button class="delete-btn" onclick="deleteExpense(${index})">ลบ</button>
            `;
            listEl.appendChild(li);
        });

        updateChart();
    }

    function setBudget() {
        let budgetInput = document.getElementById('budget').value;
        if (budgetInput && budgetInput > 0) {
            budget = parseFloat(budgetInput);
            localStorage.setItem('budget', budget);
            document.getElementById('budget').value = '';
            updateUI();
        }
    }

    function addExpense() {
        let category = document.getElementById('expense-category').value;
        let amount = document.getElementById('expense-amount').value;
        
        let today = new Date();
        let dateFormatted = today.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });

        if (category && amount && amount > 0) {
            expenses.push({ 
                name: category, 
                amount: parseFloat(amount),
                date: dateFormatted 
            });
            localStorage.setItem('expenses', JSON.stringify(expenses));
            document.getElementById('expense-amount').value = '';
            updateUI();
        }
    }

    function deleteExpense(index) {
        expenses.splice(index, 1);
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI();
    }

    function updateChart() {
        let dailyData = {};
        expenses.forEach(exp => {
            let date = exp.date ? exp.date : 'ก่อนหน้า';
            dailyData[date] = (dailyData[date] || 0) + exp.amount;
        });

        const labels = Object.keys(dailyData);
        const dataPoints = Object.values(dailyData);

        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'ยอดใช้จ่ายรายวัน (บาท)',
                    data: dataPoints,
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.2)',
                    borderWidth: 2,
                    pointRadius: 4,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    function exportToExcel() {
        if (expenses.length === 0) {
            alert('ไม่มีข้อมูลให้ดาวน์โหลดครับ!');
            return;
        }

        let excelData = expenses.map((exp, index) => ({
            'ลำดับ': index + 1,
            'วันที่': exp.date || 'ไม่ระบุ',
            'หมวดหมู่': exp.name,
            'จำนวนเงิน (บาท)': exp.amount
        }));

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "รายการใช้จ่าย");
        XLSX.writeFile(workbook, "Summary_Expenses.xlsx");
    }

    updateUI();
</script>

</body>
</html>
